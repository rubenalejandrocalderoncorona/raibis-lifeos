<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>raibis — LifeOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Mobile header -->
  <header class="mobile-header">
    <button class="mob-menu-btn" id="mob-menu-btn" aria-label="Menu">&#9776;</button>
    <span class="mob-title">raibis</span>
    <button class="theme-btn" id="mob-theme-btn" aria-label="Toggle theme" title="Toggle dark/light mode">&#9790;</button>
  </header>

  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-brand">
          <span class="brand-icon">◈</span>
          <span class="brand-name">raibis</span>
          <button class="theme-btn" id="theme-btn" aria-label="Toggle theme" title="Toggle dark/light mode">&#9790;</button>
        </div>

        <nav class="sidebar-nav">
          <a class="nav-item active" data-view="dashboard" href="#">
            <span class="nav-icon">⊞</span> Dashboard
          </a>
          <a class="nav-item" data-view="goals" href="#">
            <span class="nav-icon">◈</span> Goals
          </a>
          <a class="nav-item" data-view="projects" href="#">
            <span class="nav-icon">◆</span> Projects
          </a>
          <a class="nav-item" data-view="kanban" href="#">
            <span class="nav-icon">▦</span> Kanban
          </a>
          <a class="nav-item" data-view="sprint" href="#">
            <span class="nav-icon">⚡</span> Sprint
          </a>
          <a class="nav-item" data-view="resources" href="#">
            <span class="nav-icon">⬡</span> Resources
          </a>
          <a class="nav-item" data-view="pomodoro" href="#">
            <span class="nav-icon">◎</span> Pomodoro
          </a>
        </nav>

        <div class="sidebar-footer">
          <a class="ext-link" href="http://localhost:3333" target="_blank" rel="noopener">
            <span class="nav-icon">↗</span> StudyTrack
          </a>
        </div>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main" id="main-content">
      <!-- views injected here by JS -->
    </main>
  </div>

  <!-- Grain overlay -->
  <div class="grain" aria-hidden="true"></div>

  <!-- Modal backdrop -->
  <div class="modal-backdrop" id="modal-backdrop"></div>

  <!-- Modal: New/Edit entity -->
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">New Item</h2>
      <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- form injected dynamically -->
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
